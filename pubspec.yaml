name: sumaatophon
description: "A premium Phone Shop application built with Flutter."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  google_fonts: ^6.1.0

  google_maps_flutter: ^2.5.3
  geolocator: ^13.0.2
  carousel_slider: ^5.1.2
  flutter_blurhash: ^0.8.2
  badges: ^3.1.2
  intl: ^0.19.0
  get_it: ^9.2.1
  shimmer: ^3.0.0
  sqflite: ^2.3.3
  path: ^1.9.0
  http: ^1.6.0   # hoặc dio: ^5.x  #app Flutter gửi/nhận dữ liệu từ backend server. , tức là dùng cho API
  socket_io_client: ^3.1.2
  google_sign_in: ^6.2.1
  flutter_slidable: ^4.0.3
  pinput: ^6.0.2
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.2.1
  flutter_secure_storage: ^10.3.1
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.0
  qr_flutter: ^4.1.0
  refresh_rate: ^1.0.2
  image_picker: ^1.1.2




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  bloc_test: ^9.1.7
  mocktail: ^1.0.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
