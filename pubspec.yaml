name: sumaatophon
description: "A premium Phone Shop application built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  google_fonts: ^6.1.0
  local_auth: ^2.1.6
  google_maps_flutter: ^2.5.3
  carousel_slider: ^5.1.2
  flutter_blurhash: ^0.8.2
  badges: ^3.1.2
  intl: ^0.19.0
  get_it: ^9.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
